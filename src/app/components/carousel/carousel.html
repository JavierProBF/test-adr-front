 <div class="min-h-screen bg-[#fafafa] font-['Plus_Jakarta_Sans'] text-slate-800 antialiased flex flex-col items-center justify-center p-6 md:p-12 overflow-hidden">
      
      <!-- DECORACIÓN MINIMALISTA -->
      <div class="fixed inset-0 pointer-events-none flex items-center justify-center">
        <div class="w-[800px] h-[800px] border border-slate-100 rounded-full opacity-40"></div>
        <div class="absolute top-20 right-20 w-32 h-32 bg-[#bc002d]/5 rounded-full blur-3xl"></div>
      </div>

      <!-- CONTENEDOR PRINCIPAL -->
      <div class="w-full max-w-6xl relative z-10 space-y-8">
        
        <!-- ENCABEZADO Y CONTROL DE VISIBILIDAD -->
        <div class="flex flex-col md:flex-row justify-between items-end gap-6 animate-reveal">
         

          <!-- BOTÓN DE VISIBILIDAD -->
          <button (click)="toggleVisibility()" 
                  class="group/toggle flex items-center gap-4 px-6 py-3 bg-white border border-slate-100 rounded-2xl shadow-sm hover:shadow-md transition-all active:scale-95">
            <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 group-hover/toggle:text-[#bc002d] transition-colors">
              {{ isVisible() ? 'Ocultar Galería' : 'Mostrar Galería' }}
            </span>
            <div class="relative w-10 h-5 bg-slate-100 rounded-full p-1 transition-colors" [class.bg-red-50]="isVisible()">
                <div class="absolute top-1 bottom-1 w-3 transition-all duration-300 rounded-full shadow-sm"
                     [class.left-1]="!isVisible()" [class.bg-slate-300]="!isVisible()"
                     [class.left-6]="isVisible()" [class.bg-[#bc002d]]="isVisible()"></div>
            </div>
          </button>
        </div>

        <!-- ESTRUCTURA DEL CARRUSEL (SOLO SI ES VISIBLE) -->
        @if (isVisible()) {
          <div class="relative group/carousel animate-in fade-in zoom-in duration-500">
            
            <!-- Botones de Navegación Lateral -->
            <button (click)="scrollPrev()" class="nav-btn-zen left-[-1rem] md:left-[-4rem]">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            
            <button (click)="scrollNext()" class="nav-btn-zen right-[-1rem] md:right-[-4rem]">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>

            <!-- Contenedor de Scroll -->
            <div #carousel (scroll)="onScroll()" class="flex gap-8 overflow-x-auto snap-x snap-mandatory scroll-smooth no-scrollbar py-8 px-4">
              
              @for (item of gallery(); track item.id; let i = $index) {
                <div class="min-w-[85vw] md:min-w-[440px] snap-center">
                  <div class="nippon-card group/card">
                    <div class="h-64 overflow-hidden bg-slate-50 relative">
                      <img [src]="item.url" [alt]="item.title" 
                           class="w-full h-full object-cover grayscale group-hover/card:grayscale-0 transition-all duration-[1s] group-hover/card:scale-110">
                      <div class="absolute top-6 left-6 bg-white/90 backdrop-blur border border-slate-100 px-4 py-2 text-[9px] font-black uppercase tracking-widest text-slate-800">
                        Fase 0{{i + 1}}
                      </div>
                    </div>

                    <div class="p-8 bg-white relative">
                      <div class="flex items-center gap-3 mb-4">
                          <div class="w-1 h-6 bg-[#bc002d]"></div>
                          <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter italic">
                            {{item.title}}
                          </h3>
                      </div>
                      <p class="text-slate-500 text-xs leading-relaxed font-medium mb-8 italic">
                        {{item.description}}
                      </p>
                      <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                          <button class="text-[9px] font-black uppercase tracking-widest text-[#bc002d] flex items-center gap-2">
                            Ver Detalles
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                          </button>
                      </div>
                      <div class="absolute bottom-0 left-0 h-1 bg-[#bc002d] w-0 group-hover/card:w-full transition-all duration-700"></div>
                    </div>
                  </div>
                </div>
              }
            </div>

            <!-- NAVEGACIÓN INFERIOR -->
            <div class="flex justify-center gap-3 mt-8">
              @for (dot of gallery(); track dot.id; let i = $index) {
                <button 
                  (click)="goToSlide(i)"
                  class="h-1.5 rounded-full transition-all duration-500 cursor-pointer outline-none border-none"
                  [class.w-12]="currentIndex() === i" 
                  [class.bg-[#bc002d]]="currentIndex() === i"
                  [class.w-3]="currentIndex() !== i" 
                  [class.bg-slate-200]="currentIndex() !== i"
                  [class.shadow-[0_0_10px_rgba(188,0,45,0.2)]]="currentIndex() === i">
                </button>
              }
            </div>
          </div>
        }

      
      </div>
    </div>
