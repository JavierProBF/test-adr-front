 <!-- Fuente Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CONTENEDOR DEL WIDGET (Solo el chat) -->
    <div class="fixed bottom-4 right-4 left-4 sm:left-auto sm:bottom-6 sm:right-6 z-50 flex flex-col items-end gap-3 sm:gap-4 font-['Plus_Jakarta_Sans']">
      
      <!-- VENTANA DE CHAT (Visible/Oculta) -->
      @if (isChatOpen()) {
        <div class="w-full sm:w-[380px] h-[500px] sm:h-[600px] max-h-[calc(100vh-8rem)] bg-white border border-slate-100 shadow-2xl rounded-[2rem] sm:rounded-[2.5rem] flex flex-col overflow-hidden animate-chat-in origin-bottom-right">
          
          <!-- Cabecera del Chat -->
          <div class="bg-[#1a1a1a] p-4 sm:p-6 flex items-center justify-between text-white">
            <div class="flex items-center gap-3 sm:gap-4">
              <div class="relative">
                <div class="w-8 h-8 sm:w-10 sm:h-10 bg-[#bc002d] rounded-lg sm:rounded-xl flex items-center justify-center font-black italic text-base sm:text-lg shadow-[0_0_15px_#bc002d66]">S</div>
                <div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-emerald-500 border-2 border-[#1a1a1a] rounded-full"></div>
              </div>
              <div>
                <h3 class="text-xs sm:text-sm font-black uppercase tracking-widest italic">Senda.Int Bot</h3>
                <p class="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Asistente de Protocolos</p>
              </div>
            </div>
            
            <button (click)="toggleChat()" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-[#bc002d] transition-all hover:bg-white/10 rounded-lg">
              <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <!-- Área de Mensajes -->
          <div #scrollContainer class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 bg-slate-50/50 custom-scrollbar">
            @for (msg of messages(); track msg.time) {
              <div [class]="msg.sender === 'user' ? 'flex justify-end' : 'flex justify-start'" class="animate-message">
                <div [class]="msg.sender === 'user' ? 'bg-[#bc002d] text-white rounded-tr-none shadow-lg shadow-[#bc002d22]' : 'bg-white border border-slate-100 text-slate-700 rounded-tl-none shadow-sm'"
                     class="max-w-[90%] sm:max-w-[85%] p-4 sm:p-5 rounded-[1.5rem] sm:rounded-[2rem]">
                  
                  <!-- Contenido: Texto -->
                  @if (msg.text) {
                    <p class="text-[11px] sm:text-xs font-medium leading-relaxed italic">{{ msg.text }}</p>
                  }

                  <!-- Contenido: Archivo Adjunto -->
                  @if (msg.file) {
                    <div class="flex items-center gap-3 p-3 bg-black/5 rounded-xl border border-black/5 mt-2">
                      <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                      </div>
                      <div class="overflow-hidden">
                        <p class="text-[9px] sm:text-[10px] font-black uppercase truncate tracking-tight">{{ msg.file.name }}</p>
                        <p class="text-[8px] opacity-60 font-bold uppercase">{{ msg.file.size }} • {{ msg.file.type }}</p>
                      </div>
                    </div>
                  }

                  <span class="text-[8px] mt-2 block opacity-40 font-black uppercase tracking-tighter">
                    {{ msg.time | date:'HH:mm' }}
                  </span>
                </div>
              </div>
            }

            <!-- Indicador de Escritura del Bot -->
            @if (isTyping()) {
              <div class="flex justify-start animate-fade-in">
                <div class="bg-white border border-slate-100 p-4 rounded-2xl rounded-tl-none flex gap-1.5 items-center">
                  <div class="w-1.5 h-1.5 bg-[#bc002d] rounded-full animate-bounce"></div>
                  <div class="w-1.5 h-1.5 bg-[#bc002d]/60 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                  <div class="w-1.5 h-1.5 bg-[#bc002d]/30 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
              </div>
            }
          </div>

          <!-- Input y Adjuntos -->
          <div class="p-4 sm:p-6 bg-white border-t border-slate-100">
            <div class="relative flex items-center gap-2 sm:gap-3">
              
              <!-- Botón Adjuntar (Clip) -->
              <button (click)="fileInput.click()" 
                      class="min-w-[48px] h-12 sm:min-w-[56px] sm:h-14 bg-slate-50 border-2 border-slate-100 rounded-xl sm:rounded-2xl flex items-center justify-center text-slate-400 hover:text-[#bc002d] hover:border-[#bc002d]/20 transition-all active:scale-95">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.414a4 4 0 00-5.656-5.656l-6.415 6.414a6 6 0 108.486 8.486L20.5 13" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <input #fileInput type="file" class="hidden" (change)="onFileSelected($event)">

              <!-- Input de Mensaje -->
              <div class="relative flex-1">
                <input 
                  #messageInput
                  type="text" 
                  [value]="inputValue()"
                  (input)="onInputChange(messageInput.value)"
                  (keyup.enter)="sendMessage()"
                  placeholder="Enviar protocolo..."
                  class="w-full h-12 sm:h-14 bg-slate-50 border-2 border-slate-100 rounded-xl sm:rounded-2xl px-4 sm:px-6 text-[11px] sm:text-xs font-semibold focus:outline-none focus:border-[#bc002d] transition-all"
                >
                <button 
                  (click)="sendMessage()"
                  [disabled]="!canSend()"
                  class="absolute right-1.5 sm:right-2.5 top-1.5 sm:top-2.5 bottom-1.5 sm:bottom-2.5 w-8 sm:w-10 bg-[#bc002d] text-white rounded-lg sm:rounded-xl flex items-center justify-center hover:bg-[#1a1a1a] transition-all disabled:opacity-30 disabled:grayscale">
                  <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      }

      <!-- BOTÓN FLOTANTE (FAB) -->
      <button 
        (click)="toggleChat()"
        class="w-14 h-14 sm:w-16 sm:h-16 bg-[#bc002d] text-white rounded-2xl sm:rounded-[1.5rem] flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all relative group overflow-hidden">
        
        <div class="absolute inset-0 bg-[#bc002d] animate-ping opacity-20"></div>
        
        @if (!isChatOpen()) {
          <svg class="w-7 h-7 sm:w-8 sm:h-8 relative z-10 transition-transform group-hover:rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        } @else {
          <svg class="w-7 h-7 sm:w-8 sm:h-8 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        }
      </button>

    </div>
