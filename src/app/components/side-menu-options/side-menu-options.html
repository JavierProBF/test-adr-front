<nav id="nav" class="sidebar-nav" aria-label="Navegacion principal">
    @for (item of SideMenuItems; track item.route) {
        <a
            [routerLink]="item.route"
            [routerLinkActive]="['active']"
            [routerLinkActiveOptions]="{ exact: item.route === '/home' }"
            class="nav-item"
        >
            <span class="nav-icon">
                <i [class]="item.icon"></i>
            </span>

            <span class="nav-copy">
                <span class="nav-label">{{ item.label }}</span>
                <span class="nav-sublabel">{{ item.sublabel ?? 'Data overview' }}</span>
            </span>
        </a>
    }
</nav>
