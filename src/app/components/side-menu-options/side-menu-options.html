<nav class="sidebar-nav" aria-label="Navegacion principal">
  @for (item of SideMenuItems; track item.route) {
    <a
      [routerLink]="item.route"
      [routerLinkActive]="['active']"
      [routerLinkActiveOptions]="{ exact: item.route === '/home' }"
      class="nav-item"
      [title]="collapsed() ? item.label : ''"
    >
      <span class="nav-icon">
        <i [class]="item.icon"></i>
      </span>

      @if (!collapsed()) {
        <span class="nav-copy">
          <span class="nav-label">{{ item.label }}</span>
          <span class="nav-sublabel">{{ item.sublabel ?? 'Data overview' }}</span>
        </span>
      }
    </a>
  }
</nav>
